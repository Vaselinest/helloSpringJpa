<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>카테고리 등록</title>
</head>
<body>
<h1>새 카테고리 등록</h1>

<form th:action="@{/categories/create}" th:object="${categoryForm}" method="post">
    <div>
        <label>카테고리 이름:</label>
        <input type="text" th:field="*{name}" placeholder="카테고리 이름"/>
        <span th:errors="*{name}" style="color:red"></span>
    </div>
    <br/>
    <button type="submit">등록</button>
    <a th:href="@{/categories}">취소</a>
</form>

<hr/>
<footer>
    <p th:text="${'실습 수행 일시: ' + #temporals.format(#temporals.createNow(), 'yyyy년 MM월 dd일 (E) a hh:mm:ss')}"></p>
    <p>학번: 2171130 | 성명: 최주성</p>
</footer>
</body>
</html>
