<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>카테고리 관리</title>
    <style>
        .success { color: green; }
        .error { color: red; }
        table { border-collapse: collapse; width: 50%; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    </style>
</head>
<body>
<h1>카테고리 목록</h1>

<p th:if="${successMessage}" th:text="${successMessage}" class="success"></p>
<p th:if="${errorMessage}" th:text="${errorMessage}" class="error"></p>

<p><a th:href="@{/categories/create}">새 카테고리 등록</a> | <a th:href="@{/products}">상품 목록으로</a></p>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>카테고리 이름</th>
        <th>관리</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="cat : ${categories}">
        <td th:text="${cat.id}"></td>
        <td th:text="${cat.name}"></td>
        <td>
            <form th:action="@{/categories/{id}/delete(id=${cat.id})}" method="post"
                  onsubmit="return confirm('정말 삭제하시겠습니까?');">
                <button type="submit">삭제</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>

<hr/>
<footer>
    <p th:text="${'실습 수행 일시: ' + #temporals.format(#temporals.createNow(), 'yyyy년 MM월 dd일 (E) a hh:mm:ss')}"></p>
    <p>학번: 2171130 | 성명: 최주성</p>
</footer>
</body>
</html>
